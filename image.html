<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDL OP2 - LOTTE</title>

    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <!-- kopieren vanuit modules v -->
    <!--  ALTIJD eerst aframe/io en dan de andere!!!!!-->  


    <link rel="stylesheet" href="./css/main.css">
    <!-- css linken -->


</head>
<body>

    <a-scene 
        mindar-image="imageTargetSrc: ./assets/targets.mind; maxTrack: 4; missTolerance: 10"
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        <!-- bij mindar-image tussen de "" moet je verwijzen naar de fotos van de speelkaarten die in de map assets zitten -->

    <a-assets></a-assets>

    <a-entity mindar-image-target="targetIndex: 0">
        <a-box position="0 0 0" color="red" ></a-box>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 1">
        <a-box position="0 0 0" color="blue" ></a-box>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 2">
        <a-box position="0 0 0" color="yellow" ></a-box>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 3">
        <a-box position="0 0 0" color="yellow" ></a-box>
    </a-entity>
    <!-- vergeet targetIndex niet aan te passen na kopieren!!! -->

    
    <!-- mindar gaat er van uit dat hij maar 1 kaart moet herkennen want is moeilijk te berekenen + zoeken is moeilijker dan gewoon zien en blijven-->

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    

    <a/scene>
    
<script>
    <!--hier zou java stukje moeten komen
    knop heeft id en er zijn 2 entities met 3D modellen
    annpassen welk zichtbaar
    op knop drukken maakt de zichtbare onzichtbaar en visa versa-->
</script>

</body>
</html>
