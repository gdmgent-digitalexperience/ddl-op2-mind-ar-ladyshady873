<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>
  </head>
  <body>

    <button class="switch-button" id="switch">
    SWITCH
    </button>




    <a-scene
      mindar-face
      embedded
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <a-asset-item
          id="glassesModel"
          src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/glasses/scene.gltf"
        ></a-asset-item>

        <a-asset-item
          id="headModel"
          src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/sparkar/headOccluder.glb"
        ></a-asset-item>

        <a-asset-item
          id="FOX"
          src="assets/Fox.glb"
        ></a-asset-item>

        <a-asset-item
          id="BRIL"
          src="assets/pink_round_sunglasses.glb"
        ></a-asset-item>

        <!-- hier eerst a asset toevoegen met link naar map assets en dan pas a-gltf-model toevoegen hieronder met src="#id"-->

      </a-assets>

      <a-camera active="false" position="0 0 0"></a-camera>

      <a-entity mindar-face-target="anchorIndex: 15">
        <a-gltf-model
          mindar-face-occluder
          position="0 -0.3 0.15"
          rotation="0 0 0"
          scale="0.065 0.065 0.065"
          src="#headModel"
        ></a-gltf-model>
      </a-entity>

      <a-entity mindar-face-target="anchorIndex: 1">
        <a-gltf-model
          rotation="0 0 0"
          position="0 0 0"
          scale="1 1 1"
          src="#BRIL"
        ></a-gltf-model>
        </a-entity>

        <a-entity mindar-face-target="anchorIndex: 10">
        <a-gltf-model
          rotation="0 0 0"
          position="0 0 0"
          scale="0.01 0.01 0.01"
          src="#FOX"
        ></a-gltf-model>
        </a-entity>

        <!-- a entity met anchor index moet a gltf bevatten DUS niet alleen gltf kopiëren, maar ook a-entity met mind face target open en endtag -->

      </a-entity>
    </a-scene>
  </body>
</html>
